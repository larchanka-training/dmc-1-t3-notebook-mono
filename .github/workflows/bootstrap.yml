name: Bootstrap Terraform State

on:
  workflow_dispatch:
    inputs:
      state_bucket_name:
        description: S3 bucket name for Terraform state
        required: true
        default: dmc-1-t3-notebook-terraform-state
      lock_table_name:
        description: DynamoDB table name for Terraform state locking
        required: true
        default: dmc-1-t3-notebook-terraform-lock

permissions:
  contents: read

concurrency:
  group: terraform-bootstrap
  cancel-in-progress: false

env:
  AWS_REGION: eu-north-1
  TF_IN_AUTOMATION: "true"

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=infra/bootstrap init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/bootstrap validate

      - name: Terraform apply
        run: |
          terraform -chdir=infra/bootstrap apply -auto-approve \
            -var "state_bucket_name=${{ inputs.state_bucket_name }}" \
            -var "lock_table_name=${{ inputs.lock_table_name }}"

      - name: Write summary
        run: |
          {
            echo "## Terraform bootstrap"
            echo ""
            echo "- State bucket: ${{ inputs.state_bucket_name }}"
            echo "- Lock table: ${{ inputs.lock_table_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
