name: Deploy Main

on:
  push:
    branches:
      - main
      - DevOps
    paths:
      - docs/diag/deploy/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 867633231218.dkr.ecr.eu-north-1.amazonaws.com
  TF_STATE_BUCKET: dmc-1-t3-notebook-terraform-state
  TF_LOCK_TABLE: dmc-1-t3-notebook-terraform-lock
  TF_IN_AUTOMATION: "true"

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: main-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply shared root
        run: |
          terraform -chdir=infra/env/shared init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=t3/dmc-1-t3-notebook-mono/shared/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"
          terraform -chdir=infra/env/shared apply -auto-approve

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Capture build metadata
        id: meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ${{ env.ECR_REGISTRY }}/t3-notebook-api:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/t3-notebook-api:main-latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/t3-notebook-api:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/t3-notebook-api:buildcache,mode=max

      - name: Terraform apply production root
        run: |
          terraform -chdir=infra/env/prod init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=t3/dmc-1-t3-notebook-mono/prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"
          terraform -chdir=infra/env/prod apply -auto-approve \
            -var "api_image=${ECR_REGISTRY}/t3-notebook-api:${IMAGE_TAG}" \
            -var "deploy_nonce=${GITHUB_SHA}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build UI
        working-directory: ./ui
        run: |
          CF_DOMAIN=$(terraform -chdir=../infra/env/prod output -raw ui_cloudfront_domain_name)
          pnpm install --frozen-lockfile
          VITE_API_BASE_URL="https://${CF_DOMAIN}/api/v1" pnpm build

      - name: Deploy UI to S3
        run: |
          UI_BUCKET=$(terraform -chdir=infra/env/prod output -raw ui_bucket_name)
          aws s3 sync ui/dist/ "s3://${UI_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(terraform -chdir=infra/env/prod output -raw ui_cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Write summary
        run: |
          validation_url=$(terraform -chdir=infra/env/prod output -raw validation_url)
          api_base_url=$(terraform -chdir=infra/env/prod output -raw api_base_url)
          {
            echo "## Main deployment"
            echo ""
            echo "- Validation URL: ${validation_url}"
            echo "- API base URL: ${api_base_url}"
          } >> "$GITHUB_STEP_SUMMARY"
