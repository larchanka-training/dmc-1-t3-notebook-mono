name: Deploy Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to deploy
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

env:
  AWS_ACCOUNT_ID: "867633231218"
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 867633231218.dkr.ecr.eu-north-1.amazonaws.com
  TF_STATE_BUCKET: dmc-1-t3-notebook-terraform-state
  TF_LOCK_TABLE: dmc-1-t3-notebook-terraform-lock
  TF_IN_AUTOMATION: "true"

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      IMAGE_TAG: pr-${{ github.event.pull_request.number || inputs.pr_number }}-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check preview readiness
        run: bash infra/scripts/check_preview_readiness.sh .

      - name: Terraform apply shared root
        run: |
          terraform -chdir=infra/env/shared init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=t3/dmc-1-t3-notebook-mono/shared/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"
          terraform -chdir=infra/env/shared apply -auto-approve

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/t3-notebook-ui:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/t3-notebook-ui:pr-${{ env.PR_NUMBER }}-latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/t3-notebook-ui:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/t3-notebook-ui:buildcache,mode=max
          build-args: |
            VITE_API_URL=/api/v1

      - name: Capture build metadata
        id: meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          build-args: |
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ${{ env.ECR_REGISTRY }}/t3-notebook-api:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/t3-notebook-api:pr-${{ env.PR_NUMBER }}-latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/t3-notebook-api:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/t3-notebook-api:buildcache,mode=max

      - name: Terraform apply preview root
        run: |
          terraform -chdir=infra/env/preview init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=t3/dmc-1-t3-notebook-mono/previews/pr-${PR_NUMBER}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"
          terraform -chdir=infra/env/preview apply -auto-approve \
            -var "pr_number=${PR_NUMBER}" \
            -var "ui_image=${ECR_REGISTRY}/t3-notebook-ui:${IMAGE_TAG}" \
            -var "api_image=${ECR_REGISTRY}/t3-notebook-api:${IMAGE_TAG}" \
            -var "deploy_nonce=${GITHUB_SHA}"

      - name: Write summary
        run: |
          preview_url=$(terraform -chdir=infra/env/preview output -raw preview_url)
          preview_api_url=$(terraform -chdir=infra/env/preview output -raw preview_api_base_url)
          {
            echo "## Preview deployment"
            echo ""
            echo "- PR: ${PR_NUMBER}"
            echo "- Preview URL: ${preview_url}"
            echo "- Preview API URL: ${preview_api_url}"
          } >> "$GITHUB_STEP_SUMMARY"
