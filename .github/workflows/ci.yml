name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  AWS_REGION: eu-north-1
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format Terraform
        run: terraform fmt -check -recursive infra

      - name: Validate Terraform roots
        shell: bash
        run: |
          set -euo pipefail
          for dir in infra/bootstrap infra/env/shared infra/env/dev infra/env/prod infra/env/preview; do
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: api
        # NOTE: scoped to the self-contained unit suite. The api submodule is a
        # separate repo; its pinned commit ships root-level tests that require a
        # PostgreSQL database (tests/test_auth.py) and a stale module that fails
        # import-time collection (tests/test_auth_security.py -> missing
        # get_client_ip). The mono CI has no DB service and cannot edit the
        # submodule, so we run only tests/unit here. Full backend/integration
        # tests are the api repo's responsibility; revisit once the submodule
        # pointer is bumped to a corrected api commit.
        run: pytest tests/unit

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Check frontend formatting
        working-directory: ui
        run: pnpm format:check

      - name: Run frontend verification
        working-directory: ui
        run: pnpm verify
